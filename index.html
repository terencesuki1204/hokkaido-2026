<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>北海道 花めぐり 2026</title>

<!-- Leaflet.js — OpenStreetMap (free, no API key needed) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════
   TOKENS
════════════════════════════════ */
:root{
  --ink:#1e1a16; --ink-mid:#6a6058; --ink-soft:#a89e94; --ink-xs:#c8c0b8;
  --cream:#f7f4ef; --surface:rgba(255,255,255,.97);
  --azure:#5d9db8; --azure-s:#dbedf5; --azure-g:rgba(93,157,184,.15);
  --blush:#c07890; --blush-s:#f0dde6; --blush-g:rgba(192,120,144,.13);
  --sage:#7a9e78;  --sage-s:#ddeedd;  --sage-g:rgba(122,158,120,.13);
  --lav:#9080b8;   --lav-s:#e8e2f5;   --lav-g:rgba(144,128,184,.13);
  --sand:#b89868;  --sand-s:#f0e8d8;  --sand-g:rgba(184,152,104,.12);
  --teal:#5a9898;  --teal-s:#d8eeee;  --teal-g:rgba(90,152,152,.12);
  --g1:rgba(255,255,255,.92); --g2:rgba(255,255,255,.78); --gb:rgba(255,255,255,.58);
  --s0:0 1px 4px rgba(50,38,28,.06);
  --s1:0 2px 14px rgba(50,38,28,.10);
  --s2:0 6px 28px rgba(50,38,28,.13);
  --s3:0 16px 52px rgba(50,38,28,.18);
  --s4:0 26px 68px rgba(50,38,28,.22);
  --hdr:66px; --tabs:44px; --sheet:300px; --card-img:90px; --mbar:46px;
  --sp:.38s cubic-bezier(.34,1.56,.64,1);
  --eo:.26s cubic-bezier(.22,.68,0,1);
  --ei:.32s cubic-bezier(.4,0,.2,1);
}

/* ════════════════════════════════
   RESET
════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html{height:100%;overflow:hidden}body{overflow:hidden}
body{
  font-family:'Noto Sans TC',sans-serif;
  color:var(--ink);background:var(--cream);
  display:flex;flex-direction:column;
  width:100%;max-width:430px;
  margin-left:auto;margin-right:auto;
  position:fixed;
  top:0;left:0;right:0;
  /* svh = small viewport = excludes Safari browser chrome bar */
  /* JS overrides with exact visualViewport.height */
  height:100svh;
  overflow:hidden;
  padding-top:env(safe-area-inset-top,0px);
  padding-left:env(safe-area-inset-left,0px);
  padding-right:env(safe-area-inset-right,0px);
}

/* ════════════════════════════════
   HEADER
════════════════════════════════ */
.app-header{
  flex-shrink:0;height:var(--hdr);min-height:var(--hdr);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 20px 13px;z-index:100;
  background:
    radial-gradient(ellipse 90% 70% at 88% -5%,rgba(160,205,225,.42) 0%,transparent 56%),
    radial-gradient(ellipse 70% 55% at 5% 105%,rgba(210,178,212,.30) 0%,transparent 55%),
    linear-gradient(162deg,#edf4fb 0%,#f6eef5 46%,#edf4ed 100%);
}
.app-header::before{content:'';position:absolute;inset:0;background:linear-gradient(108deg,transparent 0%,rgba(255,255,255,.22) 48%,transparent 52%);pointer-events:none}
.app-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(175,162,148,.18) 25%,rgba(175,162,148,.18) 75%,transparent)}
.hb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(30px);animation:blobD 10s ease-in-out infinite}
.hb1{width:125px;height:125px;background:rgba(155,205,228,.30);top:-45px;right:-15px}
.hb2{width:85px;height:85px;background:rgba(212,172,200,.20);top:12px;left:-12px;animation-delay:-3s;animation-duration:12s}
.hb3{width:60px;height:60px;background:rgba(162,205,160,.16);bottom:-8px;right:82px;animation-delay:-6s;animation-duration:9s}
@keyframes blobD{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4px,-5px) scale(1.06)}66%{transform:translate(-3px,4px) scale(.96)}}
.hdr-petals{position:absolute;inset:0;pointer-events:none;opacity:.14}
.hdr-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;margin-bottom:6px}
.hdr-icons{font-size:12px;opacity:.50;letter-spacing:1px}
.hdr-badge{
  background:var(--g1);backdrop-filter:blur(14px) saturate(1.5);-webkit-backdrop-filter:blur(14px) saturate(1.5);
  border-radius:30px;padding:4px 12px;font-size:9.5px;color:var(--ink-mid);
  letter-spacing:.5px;font-weight:500;border:1px solid var(--gb);box-shadow:var(--s0);
}
.hdr-ja{font-size:8px;color:rgba(70,60,50,.36);letter-spacing:2.4px;position:relative;z-index:1;font-family:'Noto Serif JP',serif;font-weight:300;margin-bottom:3px}
.hdr-title{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:400;letter-spacing:.4px;line-height:1.3;position:relative;z-index:1;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:9px;color:var(--ink-soft);letter-spacing:.7px;margin-top:3px;position:relative;z-index:1;font-weight:300}

/* ════════════════════════════════
   DAY TABS
════════════════════════════════ */
.tabbar{
  flex-shrink:0;height:var(--tabs);
  background:rgba(247,244,239,.97);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
  border-bottom:1px solid rgba(190,178,162,.14);display:flex;align-items:center;z-index:90;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
}
.tabs-scroll{display:flex;gap:3px;overflow-x:auto;padding:0 14px;scrollbar-width:none;scroll-behavior:smooth;align-items:center;width:100%;touch-action:pan-x;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;}
.tabs-scroll::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:11px;border:1.5px solid transparent;
  cursor:pointer;transition:all var(--eo);gap:1px;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
}
.day-tab .dt-l{font-size:7px;color:var(--ink-xs);letter-spacing:.8px;font-weight:600;text-transform:uppercase}
.day-tab .dt-n{font-size:16px;font-weight:600;color:var(--ink-soft);line-height:1.1;font-family:'Noto Serif JP',serif;transition:color var(--eo)}
.day-tab .dt-d{width:3px;height:3px;border-radius:50%;background:var(--blush);margin-top:2px;opacity:0;transition:opacity var(--eo),transform var(--eo) var(--sp);transform:scale(0)}
.day-tab.active{background:rgba(255,255,255,.92);border-color:rgba(93,157,184,.24);box-shadow:var(--s1)}
.day-tab.active .dt-l{color:var(--azure)}
.day-tab.active .dt-n{color:var(--ink)}
.day-tab.active .dt-d{opacity:1;transform:scale(1)}
.day-tab:active{transform:scale(.9)}
.tabs-loading{
  width:100%;height:100%;
  display:flex;align-items:center;padding-left:14px;
  font-size:10px;color:var(--ink-xs);letter-spacing:.5px;
}

/* ════════════════════════════════
   MAP AREA
════════════════════════════════ */
.map-area{flex:1;position:relative;overflow:hidden;min-height:0;touch-action:none;-webkit-overflow-scrolling:none;min-height:200px;}

/* Leaflet map container */
#leaflet-map{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  width:100%;height:100%;
  min-height:200px;
  z-index:1;
}

/* Custom Leaflet tile style overrides */
.leaflet-tile-pane{filter:saturate(.82) brightness(1.04) hue-rotate(2deg)}
/* Hide Leaflet default attribution (we keep credit inline) */
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{display:none!important}

/* Day transition overlay */
.map-fade{position:absolute;inset:0;z-index:80;background:var(--cream);opacity:0;pointer-events:none;transition:opacity .18s ease}
.map-fade.on{opacity:1;pointer-events:all}

/* OSM credit — subtle */
.osm-credit{
  position:absolute;bottom:calc(var(--sheet) + var(--mbar) + 4px);left:50%;transform:translateX(-50%);
  font-size:7.5px;color:rgba(100,90,80,.38);letter-spacing:.3px;
  z-index:22;white-space:nowrap;pointer-events:none;
}

/* ── DAY INFO PILL ── */
.map-pill{
  position:absolute;top:14px;left:14px;right:14px;
  display:flex;align-items:center;gap:10px;
  background:var(--g1);backdrop-filter:blur(22px) saturate(1.9);-webkit-backdrop-filter:blur(22px) saturate(1.9);
  border-radius:16px;padding:11px 16px;
  box-shadow:var(--s2),inset 0 0 0 1px rgba(255,255,255,.58);
  border:1px solid rgba(255,255,255,.65);z-index:25;
}
.mp-icon{font-size:15px;opacity:.7}
.mp-body{flex:1;min-width:0}
.mp-title{font-size:11.5px;font-weight:600;color:var(--ink);letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-row{display:flex;gap:5px;margin-top:3px;align-items:center;flex-wrap:wrap}
.mp-chip{font-size:8.5px;padding:2px 9px;border-radius:20px;font-weight:600;letter-spacing:.15px;background:var(--azure-g);color:var(--azure)}
.mp-chip.d{background:var(--sand-g);color:var(--sand)}

/* ── MAP CONTROLS ── */
.map-controls{position:absolute;bottom:calc(var(--sheet) + var(--mbar) + 14px);right:14px;display:flex;flex-direction:column;gap:5px;z-index:25}
.mc-btn{
  width:44px;height:44px;border-radius:13px;
  background:var(--g1);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.65);box-shadow:var(--s1),inset 0 1px 0 rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--ink-mid);
  transition:transform var(--sp),box-shadow var(--eo);
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
}
.mc-btn:active{transform:scale(.86);box-shadow:var(--s0)}

/* ════════════════════════════════
   CUSTOM LEAFLET MARKERS
════════════════════════════════ */
/* We build HTML markers via Leaflet DivIcon */
.cpin{
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;
  animation:pinFall .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pinFall{
  0%{opacity:0;transform:translateY(-18px) scale(.5)}
  65%{transform:translateY(3px) scale(1.06)}
  82%{transform:translateY(-2px) scale(.97)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.cpin-orb{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  border:1.5px solid rgba(255,255,255,.85);position:relative;
  box-shadow:0 3px 10px rgba(0,0,0,.18),0 1px 3px rgba(0,0,0,.10),inset 0 1px 0 rgba(255,255,255,.55);
  animation:pinFloat 3.4s ease-in-out infinite;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;
}
.cpin-orb::after{content:'';position:absolute;top:4px;left:5px;width:10px;height:5px;background:rgba(255,255,255,.42);border-radius:50%}
@keyframes pinFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.cpin-stem{width:1.5px;height:7px;background:linear-gradient(to bottom,rgba(255,255,255,.65),transparent);margin-top:-1px}
.cpin-lbl{
  font-size:7.5px;font-weight:600;letter-spacing:.15px;
  background:rgba(255,255,255,.90);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:20px;padding:2px 7px;margin-top:2px;white-space:nowrap;
  color:var(--ink-mid);box-shadow:0 1px 6px rgba(0,0,0,.10);
  border:1px solid rgba(255,255,255,.65);max-width:80px;overflow:hidden;text-overflow:ellipsis;
  font-family:'Noto Sans TC',sans-serif;
}
/* Active pin pulse */
.cpin.active .cpin-orb{
  transform:scale(1.18) translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.6);
  animation:pinBobActive 2.4s ease-in-out infinite;
}
@keyframes pinBobActive{0%,100%{transform:scale(1.18) translateY(0)}50%{transform:scale(1.18) translateY(-5px)}}
.cpin.active::before{
  content:'';position:absolute;top:0;left:0;
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid rgba(93,157,184,.5);
  transform:translate(-50%,-100%);
  animation:ringPulse 1.9s ease-out infinite;
  pointer-events:none;
  margin-left:16px;margin-top:2px;
}
@keyframes ringPulse{0%{transform:translate(-50%,-100%) scale(.9);opacity:.4}100%{transform:translate(-50%,-100%) scale(1.75);opacity:0}}

/* Pin colours per type */
.pt-sight  .cpin-orb{background:linear-gradient(148deg,rgba(172,220,170,.92),rgba(130,188,128,.96));color:#2a622a}
.pt-onsen  .cpin-orb{background:linear-gradient(148deg,rgba(205,182,235,.90),rgba(172,148,218,.96));color:#46306e}
.pt-night  .cpin-orb{background:linear-gradient(148deg,rgba(140,128,210,.90),rgba(112,100,192,.96));color:#1e145a}
.pt-shop   .cpin-orb{background:linear-gradient(148deg,rgba(235,196,158,.90),rgba(210,165,118,.96));color:#6e4018}
.pt-port   .cpin-orb{background:linear-gradient(148deg,rgba(158,210,228,.90),rgba(116,182,215,.96));color:#1a5e78}
.pt-flower .cpin-orb{background:linear-gradient(148deg,rgba(235,178,215,.90),rgba(208,142,188,.96));color:#8a2858}
.pt-drive  .cpin-orb{background:linear-gradient(148deg,rgba(178,205,228,.90),rgba(146,178,215,.96));color:#1e3e68}

/* Route polyline drawn via Leaflet polyline — no separate SVG needed */

/* ════════════════════════════════
   BOTTOM SHEET
════════════════════════════════ */
.bottom-sheet{
  position:absolute;bottom:0;left:0;right:0;
  /* cap height so it never exceeds 55% of screen */
  height:calc(var(--sheet) + var(--mbar) + env(safe-area-inset-bottom, 0px));
  max-height:62vh;
  z-index:50;pointer-events:none;
  background:var(--cream);
}
/* frosted gradient fade above cards */
.sheet-fog{
  position:absolute;top:0;left:0;right:0;height:28px;
  background:linear-gradient(to bottom,rgba(247,244,239,0),rgba(247,244,239,0));
  pointer-events:none;
}
.sheet-handle{
  position:absolute;top:var(--mbar);left:0;right:0;
  height:22px;pointer-events:all;z-index:52;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;touch-action:none;
}
.sheet-handle::after{
  content:'';display:block;
  width:32px;height:4px;border-radius:4px;
  background:rgba(170,155,140,.28);
}
.card-dots{position:absolute;top:calc(var(--mbar) + 10px);left:0;right:0;display:flex;justify-content:center;gap:4px;pointer-events:none;z-index:52}
.cdot{width:4.5px;height:4.5px;border-radius:3px;background:rgba(165,150,135,.22);transition:width .32s var(--sp),background .2s}
.cdot.on{width:14px;background:var(--azure)}
.card-track{
  position:absolute;top:calc(var(--mbar) + 22px);left:0;right:0;bottom:0;
  display:flex;align-items:flex-start;gap:10px;
  overflow-x:auto;overflow-y:hidden;
  padding:4px 18px calc(14px + env(safe-area-inset-bottom, 0px));
  scroll-snap-type:x mandatory;scrollbar-width:none;
  pointer-events:all;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-x:contain;
  will-change:scroll-position;
  touch-action:pan-x;
}
.card-track::-webkit-scrollbar{display:none}

/* ════════════════════════════════
   STOP CARD
════════════════════════════════ */
.stop-card{
  flex-shrink:0;
  width:calc(100vw - 60px);
  max-width:338px;
  background:var(--surface);border-radius:20px;
  box-shadow:var(--s3);border:1px solid rgba(255,255,255,.72);
  scroll-snap-align:center;overflow:hidden;cursor:pointer;
  opacity:.68;transform:scale(.91) translateY(8px);
  transition:transform .4s var(--sp),opacity .32s var(--ei),box-shadow .32s var(--ei);
  animation:cardRise .44s var(--sp) both;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
  will-change:transform,opacity;
  -webkit-transform:scale(.91) translateY(8px);
}
.stop-card:nth-child(1){animation-delay:.04s}.stop-card:nth-child(2){animation-delay:.09s}
.stop-card:nth-child(3){animation-delay:.13s}.stop-card:nth-child(4){animation-delay:.17s}
.stop-card:nth-child(5){animation-delay:.21s}.stop-card:nth-child(6){animation-delay:.25s}
@keyframes cardRise{0%{opacity:0;transform:scale(.86) translateY(24px)}100%{opacity:.68;transform:scale(.91) translateY(8px)}}
.stop-card.active-card{
  opacity:1 !important;transform:scale(1) translateY(0) !important;
  box-shadow:var(--s4),inset 0 0 0 1px rgba(255,255,255,.6);
  animation:cardRiseA .46s var(--sp) both;
}
@keyframes cardRiseA{0%{opacity:0;transform:scale(.88) translateY(24px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* hero image */
.sc-img{position:relative;width:100%;height:var(--card-img);overflow:hidden;background:#d4e8f0;flex-shrink:0}
.sc-img img{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--eo);display:block}
.stop-card.active-card .sc-img img{transform:scale(1.04)}
.sc-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 32%,rgba(16,12,8,.32) 100%);pointer-events:none}
.sc-badge{position:absolute;top:9px;left:10px;z-index:2;font-size:8px;font-weight:600;letter-spacing:.4px;padding:3px 9px;border-radius:20px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(255,255,255,.72);color:var(--ink-mid);border:1px solid rgba(255,255,255,.65)}
.sc-time{position:absolute;bottom:9px;right:10px;z-index:2;font-size:8px;font-weight:600;color:rgba(255,255,255,.90);text-shadow:0 1px 3px rgba(0,0,0,.40);letter-spacing:.2px}

/* card body */
.sc-body{padding:11px 14px 13px;overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:200px;}
.sc-titles{margin-bottom:6px}
.sc-name-jp{font-family:'Noto Serif JP',serif;font-size:13px;font-weight:400;color:var(--ink);letter-spacing:.4px;line-height:1.3;margin-bottom:1px}
.sc-name-zh{font-size:10.5px;font-weight:500;color:var(--ink-soft);letter-spacing:.2px}
.sc-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.sc-tag{font-size:8.5px;padding:2.5px 8px;border-radius:20px;font-weight:600;letter-spacing:.15px}
.tag-loc  {background:var(--azure-g);color:var(--azure)}
.tag-dur  {background:var(--sand-g);color:var(--sand)}
.tag-sight{background:var(--sage-g);color:var(--sage)}
.tag-shop {background:var(--sand-g);color:var(--sand)}
.tag-onsen{background:var(--lav-g);color:var(--lav)}
.tag-drive{background:var(--azure-g);color:var(--azure)}
.tag-night{background:var(--lav-g);color:var(--lav)}
.tag-port {background:var(--teal-g);color:var(--teal)}
.tag-flower{background:var(--blush-g);color:var(--blush)}
.sc-note{font-size:11px;color:var(--ink-mid);line-height:1.65;margin-bottom:10px;font-weight:300}
.sc-btns{display:flex;gap:7px;flex-shrink:0;padding-top:2px}
.sc-btn{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9.5px;padding:10px 14px;border-radius:20px;
  border:1px solid rgba(175,162,148,.15);background:rgba(245,242,238,.65);
  color:var(--ink-mid);cursor:pointer;font-family:inherit;font-weight:600;
  text-decoration:none;letter-spacing:.1px;transition:transform var(--sp),background .14s;
  min-height:44px;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.sc-btn:active{transform:scale(.91)}
.sc-btn.map{color:var(--sage);background:rgba(122,158,120,.10);border-color:rgba(122,158,120,.20)}

/* ════════════════════════════════
   MODE BAR (浮在 bottom sheet 上方)
════════════════════════════════ */
.mode-bar{
  position:absolute;
  bottom:calc(var(--sheet) + env(safe-area-inset-bottom, 0px));
  left:0;right:0;
  height:var(--mbar);
  display:flex;align-items:center;justify-content:center;
  gap:4px;z-index:55;
  background:rgba(247,244,239,.97);
  backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
  border-top:1px solid rgba(190,178,162,.14);
  pointer-events:all;
  touch-action:manipulation;
}
/* safe area gap filler below mode-bar */
.mode-bar::after{
  content:'';position:absolute;

<script>
/* ─────────────────────────────────────────────────
   CRITICAL: iOS Safari height fix
   
   Problem: Safari has a bottom toolbar (~83px) that
   overlaps page content. window.innerHeight does NOT
   account for this toolbar.
   
   Solution: Use visualViewport.height when available
   (iOS 13+). This gives the TRUE visible area height
   excluding ALL browser chrome (top bar + bottom bar).
───────────────────────────────────────────────── */
function getVisibleHeight(){
  // visualViewport is the gold standard on iOS 13+
  if(window.visualViewport) return Math.round(window.visualViewport.height);
  // Fallback: innerHeight (still wrong on Safari browser but better than 100vh)
  return window.innerHeight;
}

function applyHeight(){
  const h = getVisibleHeight();
  document.body.style.height = h + 'px';
  document.body.style.maxHeight = h + 'px';
  // Reposition body if visualViewport has an offset (e.g. when keyboard opens)
  if(window.visualViewport){
    document.body.style.top = window.visualViewport.offsetTop + 'px';
  }
}

// Fire immediately
applyHeight();

// visualViewport resize is the correct event for Safari toolbar show/hide
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', function(){
    applyHeight();
    if(typeof map !== 'undefined' && map){
      setTimeout(function(){ map.invalidateSize(); }, 50);
    }
  }, {passive:true});
  window.visualViewport.addEventListener('scroll', applyHeight, {passive:true});
}

// Fallback resize handler
window.addEventListener('resize', function(){
  applyHeight();
  if(typeof map !== 'undefined' && map) map.invalidateSize();
}, {passive:true});

window.addEventListener('orientationchange', function(){
  setTimeout(function(){
    applyHeight();
    if(typeof map !== 'undefined' && map) map.invalidateSize();
  }, 350);
});

/* ══════════════════════════════════════════════════════════════
   📌 SECTION 1：TILE LAYER（地圖底圖）
   ── 一般不需要改，除非想換地圖風格
   ── 可用選項：
      OpenStreetMap 標準：
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
      CartoDB Voyager（現用，較簡潔）：
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png"
══════════════════════════════════════════════════════════════ */
const TILE_URL  = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
const TILE_ATTR = "© OpenStreetMap contributors © CARTO";


/* ══════════════════════════════════════════════════════════════
   📌 SECTION 2：DAY_VIEW — 每日地圖中心點 + 縮放級別
   ──
   ── 格式：[緯度, 經度, 縮放級別]
   ──   縮放級別：13 = 一般城市, 14 = 較放大, 12 = 較縮小
   ──
   ── 📍 要改每日地圖中心 → 修改對應 Day 的 [lat, lng, zoom]
   ── 📍 要新增一天 → 在陣列末尾加一行，同時在 itineraryData 新增對應日期
   ── 📍 順序必須與 itineraryData 的 Day 排列一致（Day1 = 陣列第 0 項）
   ══════════════════════════════════════════════════════════════ */
const DAY_VIEW = [
  [42.415, 141.105, 13],  // Day 1 · 6/17 · 登別
  [41.793, 140.740, 13],  // Day 2 · 6/18 · 函館
  [41.770, 140.730, 14],  // Day 3 · 6/19 · 函館市內
  [43.191, 140.994, 13],  // Day 4 · 6/20 · 小樽
  [43.062, 141.354, 13],  // Day 5 · 6/21 · 札幌
  [43.347, 142.383, 13],  // Day 6 · 6/22 · 富良野
  [43.596, 142.468, 13],  // Day 7 · 6/23 · 美瑛
  [43.009, 141.565, 12],  // Day 8 · 6/24 · 北廣島
  [42.775, 141.692, 13],  // Day 9 · 6/25 · 新千歲
];

let map, routePolyline, leafletMarkers = [];

function initMap(dayIdx){
  const [lat, lng, zoom] = DAY_VIEW[dayIdx] || DAY_VIEW[0];
  if(!map){
    map = L.map("leaflet-map", {
      center:[lat, lng],
      zoom: zoom,
      zoomControl: false,
      attributionControl: false,
      zoomAnimation: true,
      markerZoomAnimation: true,
      // iOS: prevent rubber-band bounce fight with card scroll
      bounceAtZoomLimits: false,
      tapTolerance: 15,
    });
    L.tileLayer(TILE_URL, {
      attribution: TILE_ATTR,
      maxZoom: 19,
      // Slightly desaturated via CSS filter on tile pane
    }).addTo(map);

    // Fix map tile loading — multiple attempts for Safari WKWebView
    setTimeout(()=>{ map.invalidateSize(); }, 100);
    setTimeout(()=>{ map.invalidateSize(); }, 400);
    setTimeout(()=>{ map.invalidateSize(); applyHeight(); }, 900);
  } else {
    map.flyTo([lat, lng], zoom, {
      animate: true,
      duration: 1.0,
      easeLinearity: 0.35,
    });
  }
}

function zoomIn(){ map && map.zoomIn(); }
function zoomOut(){ map && map.zoomOut(); }

document.getElementById("btnZoomIn").onclick = zoomIn;
document.getElementById("btnZoomOut").onclick = zoomOut;

  izakaya:"居酒屋", bbq:"燒肉", yakitori:"燒鳥", market:"市場",
  ryokan:"旅館料理", restaurant:"餐廳", cafe:"甜品 Café", airport:"機場餐廳"
};
function mapUrl(q){ return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q) }
function navUrl(ll){ return `https://www.google.com/maps/dir/?api=1&destination=${ll[0]},${ll[1]}` }

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let curDay = 0, curCard = 0, curMode = "stops", transitioning = false;
let leafletMarkersStop = [], leafletMarkersLayer = [];  // two marker layers

/* ═══════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════ */
function buildTabs(){
  const el = document.getElementById("tabsScroll");
  itineraryData.forEach((d,i)=>{
    const t = document.createElement("div");
    t.className = "day-tab" + (i===0?" active":"");
    t.innerHTML = `<span class="dt-l">DAY</span><span class="dt-n">${d.day}</span><div class="dt-d"></div>`;
    t.onclick = ()=> switchDay(i);
    el.appendChild(t);
  });
}

/* ═══════════════════════════════════════════════════
   SWITCH DAY
═══════════════════════════════════════════════════ */
function switchDay(idx){
  if(idx===curDay && document.getElementById("cardTrack").children.length) return;
  if(transitioning) return;
  transitioning = true;

  const fade = document.getElementById("mapFade");
  fade.style.transition = "opacity .18s ease";
  fade.classList.add("on");

  setTimeout(()=>{
    curDay = idx; curCard = 0;
    document.querySelectorAll(".day-tab").forEach((t,i)=>t.classList.toggle("active",i===idx));
    document.querySelectorAll(".day-tab")[idx].scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});

    const d = itineraryData[idx];
    const mpT = document.getElementById("mpTitle");
    const mpR = document.getElementById("mpRoute");
    const mpD = document.getElementById("mpDrive");
    if(mpT) mpT.textContent = `Day ${d.day} · ${d.date} · ${d.label}`;
    if(mpR) mpR.textContent = `🚗 ${d.drive.route}`;
    if(mpD) mpD.textContent = `⏱ ${d.drive.time}`;

    initMap(idx);
    renderDayLayer();   // renders markers + cards for current mode

    setTimeout(()=>{
      fade.style.transition = "opacity .26s ease";
      fade.classList.remove("on");
      setTimeout(()=>{ transitioning=false; }, 280);
    }, 80);
  }, 200);
}

/* ═══════════════════════════════════════════════════
   MODE SWITCH — the heart of new UX
═══════════════════════════════════════════════════ */
function switchMode(mode){
  if(mode === curMode) return;
  curMode = mode;
  curCard = 0;

  // Update mode bar pills
  document.querySelectorAll(".mode-pill").forEach(p=>{
    p.classList.toggle("active", p.dataset.mode === mode);
  });

  renderDayLayer();
}

/* ─── Master render dispatcher ─── */
function renderDayLayer(){
  clearLayer();
  if(curMode === "stops") renderStopsLayer();
  if(curMode === "food")  renderFoodLayer();
  if(curMode === "hotel") renderHotelLayer();
}

/* ═══════════════════════════════════════════════════
   MARKER LAYER HELPERS
═══════════════════════════════════════════════════ */
function clearLayer(){
  leafletMarkersLayer.forEach(m=>{ if(map) map.removeLayer(m); });
  leafletMarkersLayer = [];
  // Also clear route
  if(window._routeGlow){ map.removeLayer(window._routeGlow); window._routeGlow=null; }
  if(window._routeLine){ map.removeLayer(window._routeLine); window._routeLine=null; }
}

function makePin(emoji, pinType, delayMs, floatDelay, label){
  const lbl = label.split('·')[0].trim().substring(0,8);
  return L.divIcon({
    className:"",
    iconSize:[32,58], iconAnchor:[16,58],
    html:`<div class="cpin pt-${pinType}" style="animation-delay:${delayMs}ms">
      <div class="cpin-orb" style="animation-delay:${floatDelay}s">${emoji}</div>
      <div class="cpin-stem"></div>
      <div class="cpin-lbl">${lbl}</div>
    </div>`
  });
}

function setActivePin(idx){
  leafletMarkersLayer.forEach((m,i)=>{
    const el = m.getElement(); if(!el) return;
    const pin = el.querySelector(".cpin"); if(!pin) return;
    pin.classList.toggle("active", i===idx);
  });
}

/* ═══════════════════════════════════════════════════
   LAYER A: STOPS (景點)
═══════════════════════════════════════════════════ */
function renderStopsLayer(){
  const d = itineraryData[curDay];

  // Route polyline
  const pts = d.stops.filter(s=>s.latlng).map(s=>s.latlng);
  if(pts.length >= 2){
    window._routeGlow = L.polyline(pts,{color:"rgba(93,157,184,.16)",weight:8,smoothFactor:2,interactive:false}).addTo(map);
    window._routeLine = L.polyline(pts,{color:"rgba(93,157,184,.62)",weight:2.5,dashArray:"7,5",lineCap:"round",smoothFactor:1.5,interactive:false}).addTo(map);
  }

  // Markers
  d.stops.forEach((s,i)=>{
    if(!s.latlng) return;
    const icon = makePin(s.emoji, s.type, 40+i*55, -(i*0.8), s.nameZh);
    const m = L.marker(s.latlng,{icon, zIndexOffset:i===0?1000:0})
      .addTo(map).on("click",()=>jumpToCard(i));
    leafletMarkersLayer.push(m);
  });
  setActivePin(0);

  // Cards
  renderCards_stops(d);
}

function renderCards_stops(d){
  const track = document.getElementById("cardTrack");
  const dots  = document.getElementById("cardDots");
  track.innerHTML = ""; dots.innerHTML = "";

  d.stops.forEach((s,i)=>{
    const tagCls = TYPE_TAG[s.type]||"tag-sight";
    const mq = s.mapQuery||(s.nameJp+" 北海道");
    const card = document.createElement("div");
    card.className = "stop-card"+(i===0?" active-card":"");
    card.dataset.idx = i;
    card.style.animationDelay = (.04+i*.05)+"s";
    card.innerHTML = `
      <div class="sc-img">
        <img src="${s.img}" alt="${s.nameZh}" loading="lazy" decoding="async"
             onerror="this.parentElement.style.background='var(--azure-s)';this.style.display='none'"/>
        <div class="sc-badge">${s.typeLabel}</div>
        <div class="sc-time">${s.time}</div>
      </div>
      <div class="sc-body">
        <div class="sc-titles">
          <div class="sc-name-jp">${s.nameJp}</div>
          <div class="sc-name-zh">${s.nameZh}</div>
        </div>
        <div class="sc-meta">
          <span class="sc-tag tag-loc">📍 ${s.region}</span>
          <span class="sc-tag tag-dur">⏱ ${s.duration}</span>
          <span class="sc-tag ${tagCls}">${s.typeLabel}</span>
        </div>
        <div class="sc-note">${s.note}</div>
        <div class="sc-btns">
          <a class="sc-btn map" href="${mapUrl(mq)}" target="_blank">📍 Map</a>
          ${s.latlng?`<a class="sc-btn" href="${navUrl(s.latlng)}" target="_blank">🧭 導航</a>`:''}
        </div>
      </div>`;
    card.onclick = ()=> jumpToCard(i);
    track.appendChild(card);

    const dot = document.createElement("div");
    dot.className = "cdot"+(i===0?" on":"");
    dots.appendChild(dot);
  });

  track.addEventListener("scroll", onTrackScroll, {passive:true});
  track.scrollLeft = 0;
}

/* ═══════════════════════════════════════════════════
   LAYER B: FOOD (餐廳)
═══════════════════════════════════════════════════ */
function renderFoodLayer(){
  const dayNum = curDay + 1;
  const dayRests = restaurantData.filter(r=>r.day===dayNum);
  const mealOrder = {breakfast:0, lunch:1, cafe:2, dinner:3};
  const sorted = [...dayRests].sort((a,b)=>(mealOrder[a.meal]??9)-(mealOrder[b.meal]??9));

  // Markers — unique positions only (deduplicate alt options)
  const seen = new Set();
  sorted.forEach((r,i)=>{
    if(!r.latlng) return;
    const key = r.latlng.join(',');
    if(seen.has(key)) return;
    seen.add(key);
    const icon = makePin(r.emoji||"🍽", "food", 40+i*50, -(i*0.6), r.nameZh);
    const m = L.marker(r.latlng,{icon, zIndexOffset:500+i})
      .addTo(map)
      .on("click",()=>{ jumpToCard(sorted.indexOf(r)); });
    leafletMarkersLayer.push(m);
  });

  renderCards_food(sorted);
}

function renderCards_food(sorted){
  const track = document.getElementById("cardTrack");
  const dots  = document.getElementById("cardDots");
  track.innerHTML = ""; dots.innerHTML = "";

  // Group alts
  let cardList = []; // flat list of rendered card items
  let i=0;
  while(i<sorted.length){
    const r = sorted[i];
    if(r.alt){
      const grp=[r]; let j=i+1;
      while(j<sorted.length && sorted[j].alt && sorted[j].meal===r.meal){ grp.push(sorted[j]); j++; }
      cardList.push({type:"altgroup", items:grp});
      i=j;
    } else {
      cardList.push({type:"single", item:r});
      i++;
    }
  }

  if(cardList.length===0){
    const card = document.createElement("div");
    card.className = "stop-card active-card";
    card.innerHTML = `<div class="sc-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:10px">
      <div style="font-size:36px">🍱</div>
      <div style="font-size:13px;color:var(--ink-soft);font-family:'Noto Serif JP',serif;text-align:center">本日餐廳資料即將加入</div>
    </div>`;
    track.appendChild(card);
    return;
  }

  cardList.forEach((entry,ci)=>{
    const isFirst = ci===0;
    if(entry.type==="single"){
      track.appendChild(buildFoodCard(entry.item, isFirst, null));
    } else {
      // Alt group: one card with internal toggle
      track.appendChild(buildAltGroupCard(entry.items, isFirst));
    }
    const dot = document.createElement("div");
    dot.className = "cdot"+(isFirst?" on":"");
    dots.appendChild(dot);
  });

  track.addEventListener("scroll", onTrackScroll, {passive:true});
  track.scrollLeft = 0;
}

function buildFoodCard(r, isActive, altOf){
  const mq = r.mapQuery||(r.nameJp+" 北海道");
  const typeCls = REST_TYPE_CLASS[r.type]||"rtag-restaurant";
  const typeLabel = REST_TYPE_LABEL[r.type]||r.type;
  const mealLabel = MEAL_LABEL[r.meal]||r.meal;
  const mealEmo   = MEAL_EMOJI[r.meal]||"🍴";
  const mealCls   = MEAL_CLS[r.meal]||"";

  const card = document.createElement("div");
  card.className = "stop-card"+(isActive?" active-card":"");

  card.innerHTML = `
    <div class="sc-img">
      <img src="${r.img||''}" alt="${r.nameZh}" loading="lazy" decoding="async"
           onerror="this.parentElement.style.background='var(--sand-s)';this.style.display='none'"/>
      <div class="sc-badge rc-meal-badge ${mealCls}">${mealEmo} ${mealLabel}</div>
      <div class="sc-time" style="font-size:9px">${r.price||''}</div>
    </div>
    <div class="sc-body">
      <div class="sc-titles">
        <div class="sc-name-jp">${r.nameJp}</div>
        <div class="sc-name-zh">${r.nameZh}</div>
      </div>
      <div class="sc-meta">
        <span class="sc-tag tag-loc">📍 ${r.region}</span>
        <span class="sc-tag ${typeCls}">${typeLabel}</span>
      </div>
      <div class="sc-note">${r.note}</div>
      <div class="sc-btns">
        <a class="sc-btn map" href="${mapUrl(mq)}" target="_blank">📍 Map</a>
        ${r.latlng?`<a class="sc-btn" href="${navUrl(r.latlng)}" target="_blank">🧭 導航</a>`:''}
      </div>
    </div>`;

  card.onclick = (e)=>{
    if(e.target.tagName==="A") return;
    const idx = Array.from(document.getElementById("cardTrack").children).indexOf(card);
    jumpToCard(idx);
    // Pan to this restaurant on map
    if(r.latlng && map) map.panTo(r.latlng,{animate:true,duration:.5});
  };
  return card;
}

function buildAltGroupCard(items, isActive){
  // Single card with two options shown inline
  const mealLabel = MEAL_LABEL[items[0].meal]||"";
  const mealEmo   = MEAL_EMOJI[items[0].meal]||"🍴";
  const mealCls   = MEAL_CLS[items[0].meal]||"";

  const card = document.createElement("div");
  card.className = "stop-card"+(isActive?" active-card":"");

  // Build the inner alt options HTML
  let optsHtml = items.map((r,ri)=>{
    const mq = r.mapQuery||(r.nameJp+" 北海道");
    const typeCls = REST_TYPE_CLASS[r.type]||"rtag-restaurant";
    const typeLabel = REST_TYPE_LABEL[r.type]||r.type;
    return `
    <div class="alt-opt${ri===0?" alt-opt-active":""}" data-idx="${ri}" style="padding:10px 14px${ri>0?';border-top:1px solid rgba(190,178,162,.10)':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div>
          <div style="font-size:11.5px;font-weight:600;color:var(--ink);font-family:'Noto Serif JP',serif">${r.emoji||''} ${r.nameZh}</div>
          <div style="font-size:9px;color:var(--ink-soft);margin-top:1px">${r.nameJp}</div>
        </div>
        <div style="font-size:9px;color:var(--ink-soft);white-space:nowrap;margin-left:6px">${r.price||''}</div>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap">
        <span class="sc-tag tag-loc">📍 ${r.region}</span>
        <span class="sc-tag ${typeCls}">${typeLabel}</span>
      </div>
      <div style="font-size:10px;color:var(--ink-mid);line-height:1.55;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px">${r.note}</div>
      <div style="display:flex;gap:6px">
        <a class="sc-btn map" href="${mapUrl(mq)}" target="_blank">📍 Map</a>
        ${r.latlng?`<a class="sc-btn" href="${navUrl(r.latlng)}" target="_blank">🧭 導航</a>`:''}
      </div>
    </div>`;
  }).join(`<div style="display:flex;align-items:center;gap:8px;padding:0 14px"><div style="flex:1;height:1px;background:rgba(190,178,162,.15)"></div><div style="font-size:8.5px;color:var(--ink-xs);font-family:'Noto Serif JP',serif;letter-spacing:.5px">或</div><div style="flex:1;height:1px;background:rgba(190,178,162,.15)"></div></div>`);

  card.innerHTML = `
    <div class="sc-img">
      <img src="${items[0].img||''}" alt="${items[0].nameZh}" loading="lazy" decoding="async"
           onerror="this.parentElement.style.background='var(--sand-s)';this.style.display='none'"/>
      <div class="sc-badge rc-meal-badge ${mealCls}">${mealEmo} ${mealLabel} · 二選一</div>
    </div>
    <div style="overflow:hidden">${optsHtml}</div>`;

  card.onclick = (e)=>{
    if(e.target.tagName==="A") return;
    const idx = Array.from(document.getElementById("cardTrack").children).indexOf(card);
    jumpToCard(idx);
    if(items[0].latlng && map) map.panTo(items[0].latlng,{animate:true,duration:.5});
  };
  return card;
}

/* ═══════════════════════════════════════════════════
   LAYER C: HOTEL (住宿)
═══════════════════════════════════════════════════ */
function renderHotelLayer(){
  const dayNum = curDay + 1;

  // Find hotel covering this day
  let h = null;
  Object.entries(hotelData).forEach(([dk, hh])=>{
    if(!hh) return;
    if(dayNum >= +dk && dayNum < +dk + hh.nights) h = hh;
  });

  // Marker
  if(h && h.latlng){
    const icon = makePin(h.emoji, "hotel", 40, 0, h.nameZh);
    const m = L.marker(h.latlng,{icon, zIndexOffset:800}).addTo(map);
    leafletMarkersLayer.push(m);
    setActivePin(0);
  }

  renderCards_hotel(h, dayNum);
}

function renderCards_hotel(h, dayNum){
  const track = document.getElementById("cardTrack");
  const dots  = document.getElementById("cardDots");
  track.innerHTML = ""; dots.innerHTML = "";
  dots.innerHTML = '<div class="cdot on" style="width:14px"></div>';

  const card = document.createElement("div");
  card.className = "stop-card active-card";

  if(!h){
    card.innerHTML = `<div class="sc-body" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:10px">
      <div style="font-size:36px">✈️</div>
      <div style="font-size:13px;color:var(--ink-soft);font-family:'Noto Serif JP',serif;text-align:center">回程日<br>本日無住宿</div>
    </div>`;
    track.appendChild(card);
    return;
  }

  const isAB = h.type==="airbnb";
  card.innerHTML = `
    <div class="sc-img">
      <img src="${h.img||''}" alt="${h.nameZh}" loading="lazy" decoding="async"
           onerror="this.parentElement.style.background='var(--lav-s)';this.style.display='none'"/>
      <div class="sc-badge">${isAB?"🏠 AirBnb":"🏨 酒店"}</div>
      <div class="sc-time">${h.nights}泊</div>
    </div>
    <div class="sc-body">
      <div class="sc-titles">
        <div class="sc-name-jp">${h.nameJp}</div>
        <div class="sc-name-zh">${h.nameZh}</div>
      </div>
      <div class="sc-meta">
        <span class="sc-tag tag-loc">📍 ${h.region}</span>
        <span class="sc-tag tag-dur">📅 ${h.checkin} → ${h.checkout}</span>
      </div>
      <div class="sc-note">入住 ${h.checkin} · 退房 ${h.checkout} · ${h.nights}泊</div>
      <div class="sc-btns">
        <a class="sc-btn map" href="${h.url}" target="_blank">🔗 預訂</a>
        <a class="sc-btn" href="${mapUrl(h.mapQuery)}" target="_blank">📍 Map</a>
        ${h.latlng?`<a class="sc-btn" href="${navUrl(h.latlng)}" target="_blank">🧭 導航</a>`:''}
      </div>
    </div>`;

  card.onclick = (e)=>{
    if(e.target.tagName==="A") return;
    if(h.latlng && map) map.panTo(h.latlng,{animate:true,duration:.5});
  };
  track.appendChild(card);
}

/* ═══════════════════════════════════════════════════
   SCROLL / CARD SYNC
═══════════════════════════════════════════════════ */
function onTrackScroll(){
  const track = document.getElementById("cardTrack");
  const cards = track.querySelectorAll(".stop-card");
  if(!cards.length) return;
  const cw = cards[0].offsetWidth + 10;
  const idx = Math.round(track.scrollLeft / cw);
  if(idx !== curCard){ curCard=idx; onCardChange(idx); }
}

function onCardChange(idx){
  document.querySelectorAll(".stop-card").forEach((c,i)=>c.classList.toggle("active-card",i===idx));
  document.querySelectorAll(".cdot").forEach((d,i)=>d.classList.toggle("on",i===idx));

  if(curMode==="stops"){
    setActivePin(idx);
    const s = itineraryData[curDay].stops[idx];
    if(s && s.latlng && map) map.panTo(s.latlng,{animate:true,duration:.5,easeLinearity:.4});
  }
  if(curMode==="food"){
    // Find restaurant for this card
    const dayNum = curDay+1;
    const mealOrder = {breakfast:0,lunch:1,cafe:2,dinner:3};
    const sorted = restaurantData.filter(r=>r.day===dayNum)
      .sort((a,b)=>(mealOrder[a.meal]??9)-(mealOrder[b.meal]??9));
    let flatIdx=0, ci=0;
    // Build same card-list structure
    while(ci<sorted.length){
      if(ci===idx){ break; }
      if(sorted[ci].alt){
        let j=ci+1;
        while(j<sorted.length&&sorted[j].alt&&sorted[j].meal===sorted[ci].meal)j++;
        ci=j;
      } else ci++;
      flatIdx=ci;
    }
    const r = sorted[ci];
    if(r && r.latlng && map) map.panTo(r.latlng,{animate:true,duration:.5});
    if(leafletMarkersLayer[idx]) setActivePin(idx);
  }
}

function jumpToCard(idx){
  const track = document.getElementById("cardTrack");
  const cards = track.querySelectorAll(".stop-card");
  if(!cards.length || !cards[idx]) return;
  const cw = cards[0].offsetWidth + 10;
  track.scrollTo({left:cw*idx, behavior:"smooth"});
  curCard = idx;
  onCardChange(idx);
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
buildTabs();
// Wait for fonts + layout before init
document.fonts.ready.then(()=>{
  initMap(0);
  // Give Leaflet time to size
  setTimeout(()=>{ applyHeight(); map.invalidateSize(); switchDay(0); }, 300);
  setTimeout(()=>{ map.invalidateSize(); }, 800);
}).catch(()=>{
  // Fonts API not available — fallback
  setTimeout(()=>{
    initMap(0);
    setTimeout(()=>{ map.invalidateSize(); switchDay(0); }, 200);
  }, 100);
});

window.addEventListener("resize",()=>{ if(typeof map!=="undefined"&&map) map.invalidateSize(); },{passive:true});

</script>
